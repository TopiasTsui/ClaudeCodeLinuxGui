<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>Claude Code — Linux GUI (v0.0.1)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <button id="pick-dir">Choose folder…</button>
      <span id="workdir" class="muted">No folder selected</span>
      <span id="cost" class="muted right"></span>
    </header>

    <main id="transcript" aria-live="polite"></main>

    <footer>
      <textarea id="input" rows="3" placeholder="Message Claude Code…  (Ctrl+Enter to send)" disabled></textarea>
      <button id="send" disabled>Send</button>
    </footer>

    <script src="renderer.js"></script>
  </body>
</html>
